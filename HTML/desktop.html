<!DOCTYPE html>
<html lang="en">
    <head>
        <title>If you're seeing this, something's wrong</title>
        <link href="../CSS/desktop.css" rel="stylesheet">
        <script src="../JS/desktop.js"></script>
    </head>
    <body>
        <!-- App Buttons added automatically by desktop.js -->
         <audio src="../Assets/audio/desktop.ogg" autoplay="true" loop="true"></audio>
         <div id="taskbar">
            <img class="taskbarIcon" src="../Assets/Icons/settings.svg" alt="a gear icon, like a settings button">
            <img onclick="setDesktopAnimation()" class="taskbarIcon" src="../Assets/Icons/bg-change.svg" alt="clipart of a framed photograph">
         </div>
    </body>
</html>
